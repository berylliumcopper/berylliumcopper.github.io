  <script>
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightbox-image");
    const lightboxCaption = document.getElementById("lightbox-caption");
    const triggers = document.querySelectorAll(".gallery-trigger");
    const closeTargets = document.querySelectorAll("[data-close-lightbox]");

    function openLightbox(trigger) {
      const src = trigger.dataset.fullSrc;
      const alt = trigger.dataset.fullAlt;
      
      // Multi-lang caption support
      const currentLang = document.documentElement.lang || 'zh';
      const langSuffix = currentLang === 'zh' ? 'Zh' : 'En';
      const caption = trigger.dataset['caption' + langSuffix] || trigger.dataset.caption;

      lightboxImage.src = src;
      lightboxImage.alt = alt;
      lightboxCaption.textContent = caption;
      lightbox.hidden = false;
      document.body.classList.add("lightbox-open");
      
      // Mark as active for lang-switch.js to update if language changes while open
      triggers.forEach(t => t.classList.remove('active-trigger'));
      trigger.classList.add('active-trigger');
    }

    function closeLightbox() {
      lightbox.hidden = true;
      lightboxImage.src = "";
      lightboxImage.alt = "";
      lightboxCaption.textContent = "";
      document.body.classList.remove("lightbox-open");
      triggers.forEach(t => t.classList.remove('active-trigger'));
    }

    triggers.forEach((trigger) => {
      trigger.addEventListener("click", () => {
        openLightbox(trigger);
      });
    });

    closeTargets.forEach((target) => {
      target.addEventListener("click", closeLightbox);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !lightbox.hidden) {
        closeLightbox();
      }
    });
  </script>
