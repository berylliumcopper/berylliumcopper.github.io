<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Photo gallery page for a personal website.">
  <title>Your Name | Gallery</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Your Name</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a class="active" href="gallery.html">Gallery</a>
        <a href="blogs/index.html">Blogs</a>
      </nav>
    </div>
  </header>

  <main class="container page-stack">
    <section class="page-intro">
      <p class="eyebrow">Gallery</p>
      <h1>Pictures and moments</h1>
      <p class="lead">
        A small collection of images, starting with one of your own from `assets/images/`.
      </p>
    </section>

    <section class="gallery-grid">
      <figure class="panel gallery-card">
        <img src="assets/images/mc-001.png" alt="Minecraft city waterfront scene">
        <figcaption>`mc-001.png` from your local image collection.</figcaption>
      </figure>

      <figure class="panel gallery-card">
        <img src="assets/images/photo-2.svg" alt="Placeholder landscape 2">
        <figcaption>Caption for photo two.</figcaption>
      </figure>

      <figure class="panel gallery-card">
        <img src="assets/images/photo-3.svg" alt="Placeholder landscape 3">
        <figcaption>Caption for photo three.</figcaption>
      </figure>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>Add more images by copying this card pattern.</p>
    </div>
  </footer>
</body>
</html>
